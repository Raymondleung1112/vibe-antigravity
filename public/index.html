<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Upload – Photo to GCS</title>
  <meta name="description" content="Snap or choose a photo and upload it directly to Google Cloud Storage with automatic EXIF metadata extraction." />

  <!-- EXIF.js (client-side EXIF extraction) -->
  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.js"></script>

  <style>
    /* ── Design Tokens ──────────────────────────────── */
    :root {
      --bg:        #0d0f1a;
      --surface:   #161929;
      --border:    rgba(255,255,255,0.08);
      --accent:    #6c63ff;
      --accent2:   #00d4aa;
      --text:      #e8eaf6;
      --muted:     #7c7f9e;
      --success:   #00d4aa;
      --error:     #ff5f7e;
      --radius:    16px;
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }

    /* ── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108,99,255,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(0,212,170,.12) 0%, transparent 60%);
    }

    /* ── Inter font via Google Fonts ─────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* ── Card ─────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(108,99,255,.08);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(108,99,255,.25) 0%, transparent 50%, rgba(0,212,170,.15) 100%);
      z-index: 0;
      pointer-events: none;
    }
    .card > * { position: relative; z-index: 1; }

    /* ── Header ──────────────────────────────────── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 20px rgba(108,99,255,.4);
    }
    h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: -.02em; }
    .subtitle { font-size: .85rem; color: var(--muted); margin-top: 2px; }

    /* ── Drop Zone ────────────────────────────────── */
    .drop-zone {
      border: 2px dashed rgba(108,99,255,.4);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      position: relative;
      margin-bottom: 20px;
      background: rgba(108,99,255,.04);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,.10);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
    .drop-label { font-size: .95rem; font-weight: 500; color: var(--text); }
    .drop-hint  { font-size: .78rem; color: var(--muted); margin-top: 6px; }

    /* ── Preview ──────────────────────────────────── */
    #preview-wrap {
      display: none;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
      background: #000;
      max-height: 300px;
    }
    #preview-img {
      width: 100%; max-height: 300px;
      object-fit: contain;
      display: block;
    }
    #change-btn {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      transition: background var(--transition);
    }
    #change-btn:hover { background: rgba(108,99,255,.5); }

    /* ── EXIF Panel ───────────────────────────────── */
    #exif-panel {
      display: none;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      font-size: .82rem;
    }
    .exif-title {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 10px;
    }
    .exif-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .exif-row:last-child { border-bottom: none; }
    .exif-key { color: var(--muted); }
    .exif-val { color: var(--text); font-weight: 500; text-align: right; max-width: 65%; word-break: break-all; }

    /* ── Upload Button ────────────────────────────── */
    #upload-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent) 0%, #9b6cff 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 24px rgba(108,99,255,.4);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    #upload-btn:hover:not(:disabled) {
      opacity: .92; transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(108,99,255,.55);
    }
    #upload-btn:active:not(:disabled) { transform: translateY(0); }
    #upload-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Progress ─────────────────────────────────── */
    #progress-wrap {
      display: none;
      margin-top: 16px;
      background: rgba(0,0,0,.3);
      border-radius: 8px;
      height: 6px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 8px;
      transition: width .3s ease;
    }

    /* ── Toast / Status ───────────────────────────── */
    #status {
      display: none;
      margin-top: 18px;
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: .88rem;
      font-weight: 500;
      line-height: 1.5;
    }
    #status.success {
      background: rgba(0,212,170,.12);
      border: 1px solid rgba(0,212,170,.3);
      color: var(--success);
    }
    #status.error {
      background: rgba(255,95,126,.12);
      border: 1px solid rgba(255,95,126,.3);
      color: var(--error);
    }

    /* ── Spinner ──────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 400px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>

<body>
  <main class="card" role="main">

    <!-- Header -->
    <div class="logo">
      <div class="logo-icon" aria-hidden="true">📸</div>
      <div>
        <h1>Vibe Upload</h1>
        <p class="subtitle">Snap & store to Google Cloud</p>
      </div>
    </div>

    <!-- Drop Zone / File Input -->
    <div class="drop-zone" id="drop-zone" role="button" aria-label="Select or drag a photo">
      <!-- iOS: capture="environment" triggers rear camera directly -->
      <input
        type="file"
        id="file-input"
        accept="image/*"
        capture="environment"
        aria-label="Choose photo or take picture"
      />
      <span class="drop-icon" aria-hidden="true">🖼️</span>
      <p class="drop-label">Tap to take a photo or choose a file</p>
      <p class="drop-hint">JPEG · PNG · HEIC &nbsp;·&nbsp; Max 20 MB</p>
    </div>

    <!-- Preview -->
    <div id="preview-wrap" aria-live="polite">
      <img id="preview-img" alt="Selected photo preview" />
      <button id="change-btn" aria-label="Choose a different photo">Change ✕</button>
    </div>

    <!-- EXIF Metadata Panel -->
    <div id="exif-panel" aria-label="Extracted photo metadata">
      <div class="exif-title">📍 Photo Metadata</div>
      <div id="exif-rows"></div>
    </div>

    <!-- Upload Button -->
    <button id="upload-btn" disabled aria-label="Upload photo to Google Cloud Storage">
      Upload to Cloud
    </button>

    <!-- Progress Bar -->
    <div id="progress-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div id="progress-bar"></div>
    </div>

    <!-- Status Message -->
    <div id="status" role="alert" aria-live="assertive"></div>

  </main>

  <script>
    // ── DOM refs ──────────────────────────────────────
    const fileInput   = document.getElementById('file-input');
    const dropZone    = document.getElementById('drop-zone');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview-img');
    const changeBtn   = document.getElementById('change-btn');
    const exifPanel   = document.getElementById('exif-panel');
    const exifRows    = document.getElementById('exif-rows');
    const uploadBtn   = document.getElementById('upload-btn');
    const progressWrap= document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const statusEl    = document.getElementById('status');

    let currentFile   = null;
    let extractedMeta = {};

    // ── Drag & Drop support (desktop) ─────────────────
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer?.files?.[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files?.[0]) handleFile(fileInput.files[0]);
    });

    changeBtn.addEventListener('click', resetUI);

    // ── Handle selected file ──────────────────────────
    function handleFile(file) {
      currentFile = file;
      extractedMeta = {};

      // Show preview
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewWrap.style.display = 'block';
      dropZone.style.display = 'none';
      uploadBtn.disabled = false;
      hideStatus();
      exifPanel.style.display = 'none';

      // Extract EXIF asynchronously
      EXIF.getData(file, function () {
        const allTags = EXIF.getAllTags(this);
        const rows    = [];

        // Date Taken
        const dtOrig = EXIF.getTag(this, 'DateTimeOriginal') || EXIF.getTag(this, 'DateTime');
        if (dtOrig) {
          extractedMeta.dateTaken = dtOrig;
          rows.push({ key: 'Date Taken', val: dtOrig });
        }

        // GPS Latitude
        const latArr = EXIF.getTag(this, 'GPSLatitude');
        const latRef = EXIF.getTag(this, 'GPSLatitudeRef');
        const lonArr = EXIF.getTag(this, 'GPSLongitude');
        const lonRef = EXIF.getTag(this, 'GPSLongitudeRef');
        const altNum = EXIF.getTag(this, 'GPSAltitude');

        if (latArr && lonArr) {
          const lat = toDecimalDeg(latArr, latRef);
          const lon = toDecimalDeg(lonArr, lonRef);
          extractedMeta.latitude  = lat;
          extractedMeta.longitude = lon;
          rows.push({ key: 'Latitude',  val: lat.toFixed(6) + '°' });
          rows.push({ key: 'Longitude', val: lon.toFixed(6) + '°' });

          if (altNum !== undefined) {
            const alt = typeof altNum === 'object' ? altNum.numerator / altNum.denominator : altNum;
            extractedMeta.altitude = alt;
            rows.push({ key: 'Altitude', val: alt.toFixed(1) + ' m' });
          }
        }

        // Camera make/model (informational only)
        const make  = EXIF.getTag(this, 'Make');
        const model = EXIF.getTag(this, 'Model');
        if (make || model) rows.push({ key: 'Camera', val: [make, model].filter(Boolean).join(' ') });

        if (rows.length > 0) {
          exifRows.innerHTML = rows.map(r =>
            `<div class="exif-row">
               <span class="exif-key">${escapeHtml(r.key)}</span>
               <span class="exif-val">${escapeHtml(String(r.val))}</span>
             </div>`
          ).join('');
          exifPanel.style.display = 'block';
        }
      });
    }

    // ── Upload ─────────────────────────────────────────
    uploadBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      uploadBtn.disabled = true;
      uploadBtn.innerHTML = '<div class="spinner"></div> Uploading…';
      progressWrap.style.display = 'block';
      progressBar.style.width = '10%';
      hideStatus();

      try {
        const formData = new FormData();
        formData.append('photo', currentFile, currentFile.name);
        formData.append('metadata', JSON.stringify(extractedMeta));

        // Use XHR for upload progress events
        await xhrUpload('/upload', formData);

        progressBar.style.width = '100%';
        showStatus('success', '✅ Photo uploaded successfully to Google Cloud Storage!');
        resetUI();
      } catch (err) {
        showStatus('error', `❌ Upload failed: ${err.message}`);
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = 'Retry Upload';
      } finally {
        setTimeout(() => {
          progressWrap.style.display = 'none';
          progressBar.style.width = '0%';
        }, 800);
      }
    });

    // ── XHR with progress ─────────────────────────────
    function xhrUpload(url, formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 90) + 10;
            progressBar.style.width = pct + '%';
            progressWrap.setAttribute('aria-valuenow', pct);
          }
        });
        xhr.addEventListener('load', () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve(JSON.parse(xhr.responseText));
          } else {
            let msg = `HTTP ${xhr.status}`;
            try { msg = JSON.parse(xhr.responseText).error || msg; } catch {}
            reject(new Error(msg));
          }
        });
        xhr.addEventListener('error', () => reject(new Error('Network error')));
        xhr.send(formData);
      });
    }

    // ── Helpers ───────────────────────────────────────
    function toDecimalDeg(arr, ref) {
      const d = arr[0].numerator / arr[0].denominator;
      const m = arr[1].numerator / arr[1].denominator;
      const s = arr[2].numerator / arr[2].denominator;
      const dec = d + m / 60 + s / 3600;
      return (ref === 'S' || ref === 'W') ? -dec : dec;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showStatus(type, msg) {
      statusEl.className = type;
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
    }
    function hideStatus() { statusEl.style.display = 'none'; }

    function resetUI() {
      currentFile = null;
      extractedMeta = {};
      fileInput.value = '';
      previewImg.src = '';
      previewWrap.style.display = 'none';
      dropZone.style.display = 'block';
      exifPanel.style.display = 'none';
      uploadBtn.disabled = true;
      uploadBtn.innerHTML = 'Upload to Cloud';
    }
  </script>
</body>
</html>
